services:
  postgres:
    image: postgres:15-alpine
    container_name: du_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_admin
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - du_network

  etl:
    build: .
    container_name: du_etl
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    networks:
      - du_network

volumes:
  postgres_data:
    driver: local

networks:
  du_network:
    driver: bridge