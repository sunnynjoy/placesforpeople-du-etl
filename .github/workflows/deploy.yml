name: Build, Deploy to Cloud Run, and Trigger Daily

on:
  push:
    branches:
      - main
  schedule:
    # Daily at 2 AM UTC
    - cron: '0 2 * * *'

env:
  PROJECT_ID: placesforpeople-500907
  REGION: us-central1
  SERVICE_NAME: placesforpeople-etl
  REGISTRY: us-central1-docker.pkg.dev

jobs:
  build-and-deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
          service_account_key: ${{ secrets.GCP_SA_KEY }}
          export_default_credentials: true

      - name: Build Docker image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/placesforpeople-etl/${{ env.SERVICE_NAME }}:${{ github.sha }} .
          docker tag ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/placesforpeople-etl/${{ env.SERVICE_NAME }}:${{ github.sha }} \
                     ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/placesforpeople-etl/${{ env.SERVICE_NAME }}:latest

      - name: Push to Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGISTRY }}
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/placesforpeople-etl/${{ env.SERVICE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/placesforpeople-etl/${{ env.SERVICE_NAME }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --image ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/placesforpeople-etl/${{ env.SERVICE_NAME }}:latest \
            --platform managed \
            --allow-unauthenticated

  trigger-etl:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Cloud Run ETL
        run: |
          curl -X POST https://${{ env.REGION }}-run.googleapis.com/apis/run.googleapis.com/v1/projects/${{ env.PROJECT_ID }}/locations/${{ env.REGION }}/services/${{ env.SERVICE_NAME }}:run
        env:
          REGION: us-central1